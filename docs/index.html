<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Manga Downloader Docs</title>
  <meta http-equiv="refresh" content="0; url=./en/" />
  <script>
    (function () {
      var lang = (navigator.language || 'en').toLowerCase();
      var path = './en/';
      if (lang.startsWith('uk')) path = './uk/';
      if (lang.startsWith('ru')) path = './ru/';
      window.location.replace(path);
    })();
  </script>
</head>
<body>
  <p>Redirecting to documentation language page...</p>
  <p><a href="./en/">English</a> | <a href="./uk/">Українська</a> | <a href="./ru/">Русский</a></p>
</body>
</html>
